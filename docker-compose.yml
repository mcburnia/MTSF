services:
  nginx:
    image: nginx:alpine
    container_name: mtsf_nginx
    ports:
      - "3002:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - postgres
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - mtsf_net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: mtsf_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      DEV_SKIP_EMAIL: ${DEV_SKIP_EMAIL}
      MTSF_E2E_MODE: ${MTSF_E2E_MODE:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mtsf_net
    restart: unless-stopped

  # ── Test Stack (docker compose --profile test up -d) ──────────────────
  # Isolated backend + database for tests. NEVER shares data with live.

  backend_test:
    build: ./backend
    container_name: mtsf_backend_test
    ports:
      - "3011:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mtsf_test
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://backend_test:3001
      DEV_SKIP_EMAIL: "true"
      LOG_LEVEL: warn
      MTSF_TEST_MODE: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      RESEND_API_KEY: "re_placeholder"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mtsf_net
    profiles:
      - test
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mtsf_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "work_mem=4MB", "-c", "effective_cache_size=768MB", "-c", "maintenance_work_mem=64MB"]
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - mtsf_pg_data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/01-init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - mtsf_net
    restart: unless-stopped

volumes:
  mtsf_pg_data:

networks:
  mtsf_net:
    driver: bridge
